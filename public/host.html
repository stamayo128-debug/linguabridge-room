<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinguaBridge - Host</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ═══ HOST SETUP SCREEN ═══ -->
<div class="join-screen" id="setup-screen">
    <form class="join-form" id="setup-form">
        <div class="logo">LinguaBridge</div>
        <p class="tagline">Panel de Control del Anfitrión</p>
        
        <div class="input-group">
            <label for="host-password">Contraseña de Seguridad</label>
            <input type="password" id="host-password" placeholder="Contraseña del host" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="host-name">Tu Nombre</label>
            <input type="text" id="host-name" placeholder="Nombre del presentador" value="Presentador" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="host-lang">Tu Idioma (hablarás en)</label>
            <select id="host-lang">
                <option value="es" selected>🇪🇸 Español</option>
                <option value="en">🇬🇧 English</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="pt">🇵🇹 Português</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Crear Sala</button>
        <div id="setup-error" class="error-text"></div>
    </form>
</div>

<!-- ═══ HOST DASHBOARD (Swipe Container) ═══ -->
<div class="swipe-container hidden" id="dashboard-container">
    <div class="swipe-wrapper" id="swipe-wrapper">
        
        <!-- ─── PANEL LEFT: Transcript ─── -->
        <div class="panel panel-left" id="panel-transcript">
            <div class="panel-header">
                <h2><span class="pulse-dot"></span> Transcripción</h2>
                <span class="header-badge" id="room-code-badge">Sala 0000</span>
            </div>
            
            <div class="transcript-area" id="transcript-area">
                <div class="welcome-msg">Habla para ver las traducciones aquí...</div>
            </div>
        </div>
        
        <!-- ─── PANEL CENTER: 3D Sphere ─── -->
        <div class="panel panel-center" id="panel-sphere">
            <div class="panel-header">
                <h2>Host: <span id="host-name-display">Presentador</span></h2>
            </div>
            
            <div class="sphere-container">
                <div class="sphere" id="sphere" style="background: radial-gradient(circle at 30% 30%, rgba(16, 185, 129, 0.3), rgba(59, 130, 246, 0.2), transparent 70%);">
                    <div class="sphere-inner"></div>
                </div>
                <div class="sphere-particles" id="sphere-particles"></div>
            </div>
            
            <div class="mic-container" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);">
                <div class="visualizer" id="visualizer">
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                </div>
                <button class="mic-btn" id="mic-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </button>
                <span class="mic-status" id="mic-status">Micrófono apagado</span>
            </div>
            
            <!-- Mode Toggle -->
            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px;">
                <button class="btn btn-small" id="mode-conf" style="background: var(--primary);">Conferencia</button>
                <button class="btn btn-small btn-secondary" id="mode-meet">Reunión</button>
            </div>
        </div>
        
        <!-- ─── PANEL RIGHT: Participants ─── -->
        <div class="panel panel-right" id="panel-participants">
            <div class="panel-header">
                <h2>👥 Participantes</h2>
                <span class="header-badge" id="participant-count-badge">0 conectados</span>
            </div>
            
            <div style="flex: 1; overflow-y: auto; padding: 0 20px;" id="participants-list">
                <div class="welcome-msg">Nadie conectado aún</div>
            </div>
            
            <div class="control-section" style="padding: 20px;">
                <h4>Compartir Sala</h4>
                <div class="qr-container" id="qrcode"></div>
                <div class="room-code" id="display-room-code">0000</div>
                <button class="btn btn-secondary btn-small" id="share-btn" style="width: 100%; margin-bottom: 12px;">Copiar Enlace</button>
                <button class="btn btn-danger btn-small" id="end-btn" style="width: 100%;">Terminar Sesión</button>
            </div>
        </div>
        
    </div>
    
    <!-- Navigation Pills -->
    <div class="nav-pills">
        <div class="nav-pill" data-panel="transcript"></div>
        <div class="nav-pill active" data-panel="sphere"></div>
        <div class="nav-pill" data-panel="participants"></div>
    </div>
</div>

<script src="host.js"></script>
</body>
</html>

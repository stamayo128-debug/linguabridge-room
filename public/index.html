<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LinguaBridge - Participante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#0f0f14',
                        surface: '#1a1a24',
                        primary: '#6366f1',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0f0f14; color: #f1f5f9; overflow: hidden; height: 100vh; }
        
        .glass-panel {
            background: rgba(30, 30, 40, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @property --angle { syntax: "<angle>"; inherits: false; initial-value: 0deg; }
        .siri-orb {
            display: grid; grid-template-areas: "stack";
            overflow: hidden; border-radius: 50%; position: relative;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 30%, transparent 70%);
            cursor: pointer; transition: transform 0.2s ease, opacity 0.2s, box-shadow 0.3s;
            margin: 0 auto;
        }
        .siri-orb:hover { transform: scale(1.05); }
        .siri-orb:active { transform: scale(0.95); }
        .siri-orb.disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: grayscale(100%); }
        .siri-orb.listening { box-shadow: 0 0 40px rgba(34, 197, 94, 0.4); }
        
        .siri-orb::before {
            content: ""; display: block; grid-area: stack; width: 100%; height: 100%; border-radius: 50%;
            --c1: oklch(75% 0.15 350); --c2: oklch(80% 0.12 200); --c3: oklch(78% 0.14 280);
            background:
                conic-gradient(from calc(var(--angle) * 1.2) at 30% 65%, var(--c3) 0deg, transparent 45deg 315deg, var(--c3) 360deg),
                conic-gradient(from calc(var(--angle) * 0.8) at 70% 35%, var(--c2) 0deg, transparent 60deg 300deg, var(--c2) 360deg),
                conic-gradient(from calc(var(--angle) * -1.5) at 65% 75%, var(--c1) 0deg, transparent 90deg 270deg, var(--c1) 360deg),
                conic-gradient(from calc(var(--angle) * 2.1) at 25% 25%, var(--c2) 0deg, transparent 30deg 330deg, var(--c2) 360deg),
                conic-gradient(from calc(var(--angle) * -0.7) at 80% 80%, var(--c1) 0deg, transparent 45deg 315deg, var(--c1) 360deg),
                radial-gradient(ellipse 120% 80% at 40% 60%, var(--c3) 0%, transparent 50%);
            filter: blur(15px) contrast(1.8) saturate(1.2);
            animation: rotate 20s linear infinite; transform: translateZ(0);
            will-change: transform;
        }
        
        .siri-orb.listening::before {
            --c1: oklch(70% 0.2 150); --c2: oklch(75% 0.15 180); --c3: oklch(65% 0.2 140);
            animation: rotate 3s linear infinite;
        }

        .siri-orb::after {
            content: ""; display: block; grid-area: stack; width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 45% 55%, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 30%, transparent 60%);
            mix-blend-mode: overlay;
        }

        @keyframes rotate { from { --angle: 0deg; } to { --angle: 360deg; } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }

        .msg-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bg-glow-1 { position: absolute; top: -20%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 60%); z-index: -1; pointer-events: none; }
        .bg-glow-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, transparent 60%); z-index: -1; pointer-events: none; }
        
        .btn-base { display: inline-flex; align-items: center; justify-content: center; border-radius: 0.5rem; transition: all 0.2s; outline: none; }
        .btn-candy { background-color: #ec4899; color: white; }
        .btn-candy:hover { background-color: #db2777; transform: translateY(-1px); }
        .btn-default { background-color: rgba(255,255,255,0.1); color: white; }
        .btn-default:hover { background-color: rgba(255,255,255,0.2); }
        .btn-active { background-color: #6366f1; color: white; box-shadow: 0 0 15px rgba(99,102,241,0.4); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative w-full h-full">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="h-full flex flex-col relative z-10">
        <!-- Login Screen -->
        <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
            <div class="glass-panel w-full max-w-md p-8 rounded-2xl flex flex-col gap-6">
                <div class="text-center">
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-pink-400 bg-clip-text text-transparent mb-2">LinguaBridge</h1>
                    <p class="text-gray-400 text-sm">Traducción en tiempo real</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Código de Sala</label>
                        <input type="text" id="room-code" placeholder="Ej: 1234" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-indigo-500 focus:outline-none transition-colors" maxlength="4" inputmode="numeric">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Tu Nombre</label>
                        <input type="text" id="participant-name" placeholder="¿Cómo te llamas?" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-indigo-500 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Idioma</label>
                        <select id="lang-select" class="w-full bg-[#1a1a24] border border-white/10 rounded-xl px-4 py-3 text-white focus:border-indigo-500 focus:outline-none transition-colors appearance-none">
                            <option value="es">🇪🇸 Español</option>
                            <option value="en">🇬🇧 English</option>
                            <option value="fr">🇫🇷 Français</option>
                            <option value="de">🇩🇪 Deutsch</option>
                            <option value="ja">🇯🇵 日本語</option>
                            <option value="zh">🇨🇳 中文</option>
                            <option value="pt">🇵🇹 Português</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex flex-col gap-3 mt-2">
                    <button id="join-btn" class="btn-base btn-candy w-full py-3.5 text-base font-semibold shadow-lg shadow-pink-500/20">Unirse a la sala</button>
                    <button onclick="window.location.href='host.html'" class="btn-base btn-default w-full py-3 text-sm">Crear nueva sala (Host)</button>
                </div>
                <div id="error" class="text-red-400 text-sm text-center min-h-[20px]"></div>
            </div>
        </div>

        <!-- Room Screen -->
        <div id="room-screen" class="hidden flex-1 p-4 md:p-8 max-w-[1400px] mx-auto w-full flex flex-col md:flex-row gap-6 h-full min-h-0">
            
            <!-- Left Panel: Controls & Orb -->
            <div class="md:w-[350px] lg:w-[400px] flex flex-col justify-center items-center gap-6 relative shrink-0">
                
                <!-- Status Header (Mobile) -->
                <div class="md:hidden glass-panel rounded-xl p-4 w-full flex justify-between items-center mb-2">
                    <div>
                        <div class="text-indigo-400 font-bold text-xl tracking-widest" id="display-room-m">----</div>
                        <div class="text-xs text-gray-400" id="display-name-m">-</div>
                    </div>
                    <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                        <div id="status-dot-m" class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                        <span class="text-xs font-medium text-gray-300" id="status-text-m">Conectando</span>
                    </div>
                </div>

                <!-- The Orb -->
                <div class="flex flex-col items-center justify-center gap-6 mt-auto mb-auto w-full py-10">
                    <div id="mic-orb" class="siri-orb" style="width: 220px; height: 220px;"></div>
                    <div id="mic-status" class="text-sm font-medium text-gray-400 tracking-wide uppercase mt-4">Toca para hablar</div>
                </div>

                <!-- Quick Controls -->
                <div class="w-full glass-panel rounded-2xl p-5 flex flex-col gap-5 mt-auto border border-white/10">
                    <div class="flex flex-col gap-3">
                        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1">Tu Idioma</span>
                        <div id="lang-bar" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide px-1">
                            <button class="btn-base btn-active px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0" data-lang="es">ES</button>
                            <button class="btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0" data-lang="en">EN</button>
                            <button class="btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0" data-lang="fr">FR</button>
                            <button class="btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0" data-lang="de">DE</button>
                            <button class="btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0" data-lang="ja">JA</button>
                            <button class="btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0" data-lang="zh">ZH</button>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-1">Audio (TTS)</span>
                        <div class="flex gap-3">
                            <button id="tts-on" class="flex-1 btn-base btn-active py-2.5 text-sm rounded-xl font-medium">🔊 Escuchar</button>
                            <button id="tts-off" class="flex-1 btn-base btn-default py-2.5 text-sm rounded-xl font-medium">🔇 Silenciar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Transcript -->
            <div class="flex-1 glass-panel rounded-2xl flex flex-col min-h-0 overflow-hidden border border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.3)]">
                <!-- Header (Desktop) -->
                <div class="hidden md:flex justify-between items-center p-5 border-b border-white/10 bg-white/5 backdrop-blur-md z-10 shrink-0">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-500/20 px-4 py-1.5 rounded-xl border border-indigo-500/30">
                            <span class="text-indigo-400 font-bold tracking-[0.2em] text-xl" id="display-room">----</span>
                        </div>
                        <span class="text-gray-300 font-medium text-lg" id="display-name">-</span>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 shadow-inner">
                        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                        <span class="text-xs font-semibold uppercase tracking-wider text-gray-300" id="status-text">Conectando</span>
                    </div>
                </div>

                <!-- Chat Area -->
                <div id="transcript" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-5 bg-gradient-to-b from-transparent to-black/20">
                    <div class="flex flex-col items-center justify-center h-full text-gray-500 gap-4 opacity-50 my-auto">
                        <svg class="w-16 h-16 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        <p class="text-sm font-medium tracking-wide uppercase">El historial de traducción aparecerá aquí</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        const socket = io();
        let currentRoom = '';
        let currentName = '';
        let currentLang = 'es';
        let isMicOn = false;
        let isAllowedToSpeak = true;
        let ttsEnabled = true;
        let recognition = null;
        let bestVoices = {};

        const loginScreen = document.getElementById('login-screen');
        const roomScreen = document.getElementById('room-screen');
        const errorEl = document.getElementById('error');
        const transcriptEl = document.getElementById('transcript');
        const micOrb = document.getElementById('mic-orb');
        const micStatus = document.getElementById('mic-status');

        // TTS voices
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            ['es','en','fr','de','ja','zh','pt'].forEach(lang => {
                bestVoices[lang] = voices.find(v => v.lang.startsWith(lang) && (v.name.includes('Google') || v.name.includes('Neural') || v.name.includes('Siri'))) 
                                || voices.find(v => v.lang.startsWith(lang)) 
                                || null;
            });
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text, lang) {
            if (!ttsEnabled) return;
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            if (bestVoices[lang]) utt.voice = bestVoices[lang];
            utt.lang = lang;
            utt.rate = 1;
            window.speechSynthesis.speak(utt);
        }

        // STT
        function initSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addMessage('Sistema', 'El reconocimiento de voz no está disponible en este navegador.', true);
                return;
            }
            
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = currentLang;
            
            let lastFinal = '';
            let lastInterimSend = 0;
            
            recognition.onresult = (e) => {
                let final = '', interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    const r = e.results[i];
                    if (r.isFinal) final += r[0].transcript;
                    else interim += r[0].transcript;
                }
                
                if (final.trim() && final !== lastFinal) {
                    lastFinal = final;
                    const text = final.trim();
                    removeInterim();
                    socket.emit('translate:text', {
                        roomCode: currentRoom, text: text,
                        speakerName: currentName, speakerLang: currentLang,
                        streaming: false
                    });
                } else if (interim.trim()) {
                    showInterim(interim.trim(), currentName);
                    const now = Date.now();
                    if (now - lastInterimSend > 1500) {
                        lastInterimSend = now;
                        socket.emit('translate:text', {
                            roomCode: currentRoom, text: interim.trim(),
                            speakerName: currentName, speakerLang: currentLang,
                            streaming: true
                        });
                    }
                }
            };
            
            recognition.onerror = (e) => {
                if (e.error === 'no-speech') return;
                console.error('STT Error:', e.error);
                micStatus.textContent = 'Error: ' + e.error;
                micStatus.className = 'text-xs font-bold text-red-400 tracking-wide uppercase mt-4';
                isMicOn = false;
                updateMicUI();
                if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    addMessage('Sistema', 'Permiso de micrófono denegado o no disponible. Verifica que usas HTTPS.', true);
                }
            };
            
            recognition.onend = () => {
                if (isMicOn && recognition && isAllowedToSpeak) recognition.start();
            };
        }

        function showInterim(text, sender = currentName) {
            let el = document.getElementById('interim-msg');
            if (!el) {
                const empty = transcriptEl.querySelector('.flex-col.items-center');
                if (empty) empty.remove();
                el = document.createElement('div');
                el.id = 'interim-msg';
                el.className = 'msg-enter bg-white/5 border-l-2 border-yellow-500/80 rounded-r-xl p-4 mr-12 opacity-80 shadow-lg';
                transcriptEl.appendChild(el);
            }
            el.innerHTML = `<div class="text-xs font-bold text-yellow-500 mb-1.5 tracking-wider uppercase flex items-center gap-2">${sender} <span class="w-1.5 h-1.5 bg-yellow-500 rounded-full animate-bounce"></span></div><div class="text-gray-300 italic text-[15px]">${text}</div>`;
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        function removeInterim() {
            const el = document.getElementById('interim-msg');
            if (el) el.remove();
        }

        function addMessage(sender, text, isSystem = false) {
            const empty = transcriptEl.querySelector('.flex-col.items-center');
            if (empty) empty.remove();
            
            const msg = document.createElement('div');
            const isMe = sender === currentName;
            
            let classes = "msg-enter p-4 md:p-5 rounded-2xl max-w-[85%] w-fit shadow-lg ";
            if (isSystem) {
                classes += "bg-green-500/10 border border-green-500/20 text-green-300 mx-auto text-center text-sm font-medium backdrop-blur-sm";
            } else if (isMe) {
                classes += "bg-indigo-600/30 border border-indigo-500/30 text-white ml-auto rounded-tr-sm backdrop-blur-sm";
            } else {
                classes += "bg-white/10 border border-white/10 text-gray-100 mr-auto rounded-tl-sm backdrop-blur-sm";
            }
            
            msg.className = classes;
            const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            
            if (isSystem) {
                msg.innerHTML = `<div>${text}</div>`;
            } else {
                msg.innerHTML = `
                    <div class="flex items-center gap-3 mb-2">
                        <span class="text-xs font-bold ${isMe ? 'text-indigo-300' : 'text-pink-400'} uppercase tracking-widest">${sender}</span>
                        <span class="text-[10px] text-gray-400/80 font-medium">${time}</span>
                    </div>
                    <div class="text-base leading-relaxed tracking-wide">${text}</div>
                `;
            }
            
            transcriptEl.appendChild(msg);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        // Join
        document.getElementById('join-btn').addEventListener('click', async () => {
            currentRoom = document.getElementById('room-code').value.trim();
            currentName = document.getElementById('participant-name').value.trim();
            currentLang = document.getElementById('lang-select').value;
            
            if (!currentRoom || !currentName) {
                errorEl.textContent = 'Completa todos los campos para entrar';
                return;
            }
            
            errorEl.textContent = 'Conectando con el servidor...';
            
            const utt = new SpeechSynthesisUtterance(' ');
            utt.volume = 0;
            window.speechSynthesis.speak(utt);
            
            await initAudio();
            initSTT();
            
            socket.emit('participant:join_room', { roomCode: currentRoom, name: currentName, lang: currentLang });
        });

        let audioContext, analyser, dataArray, micStream;
        async function initAudio() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(micStream);
                source.connect(analyser);
            } catch (e) {
                console.error('Audio error:', e);
            }
        }

        // Socket Events
        socket.on('connect', () => { updateStatus('connected'); });
        socket.on('disconnect', () => {
            updateStatus('disconnected');
            if (isMicOn) micOrb.click(); // force off
        });

        function updateStatus(state) {
            const dots = [document.getElementById('status-dot'), document.getElementById('status-dot-m')];
            const texts = [document.getElementById('status-text'), document.getElementById('status-text-m')];
            
            dots.forEach(d => {
                if(!d) return;
                d.className = 'w-2.5 h-2.5 rounded-full shadow-lg ' + (state === 'connected' ? 'bg-green-500 shadow-green-500/50' : 'bg-red-500 shadow-red-500/50');
            });
            texts.forEach(t => {
                if(!t) return;
                t.textContent = state === 'connected' ? 'Conectado' : 'Desconectado';
            });
        }

        socket.on('participant:joined', (data) => {
            loginScreen.classList.add('hidden');
            roomScreen.classList.remove('hidden');
            document.getElementById('display-room').textContent = data.roomCode;
            document.getElementById('display-room-m').textContent = data.roomCode;
            document.getElementById('display-name').textContent = data.name;
            document.getElementById('display-name-m').textContent = data.name;
            addMessage('Sistema', '¡Bienvenido! Toca el orbe central para empezar a hablar.', true);
            
            // set initial active lang
            document.querySelectorAll('#lang-bar button').forEach(b => {
                if (b.dataset.lang === currentLang) {
                    b.className = 'btn-base btn-active px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0 shadow-lg shadow-indigo-500/30';
                } else {
                    b.className = 'btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0';
                }
            });
        });

        socket.on('error', (msg) => { errorEl.textContent = msg; });

        socket.on('transcript:broadcast', (data) => {
            if (!data.text) return;
            if (data.isInterim) {
                showInterim(data.text, data.senderName);
                return;
            }
            removeInterim();
            addMessage(data.senderName, data.text);
            if (!data.isMe && data.senderName !== currentName) {
                setTimeout(() => speak(data.text, currentLang), 300);
            }
        });

        socket.on('host:force_mute', () => {
            isMicOn = false;
            isAllowedToSpeak = false;
            micOrb.classList.add('disabled');
            if (recognition) recognition.stop();
            updateMicUI();
            addMessage('Sistema', 'El moderador de la sala te ha silenciado', true);
        });

        socket.on('host:allow_speak', () => {
            isAllowedToSpeak = true;
            micOrb.classList.remove('disabled');
            updateMicUI();
            addMessage('Sistema', 'El moderador ha habilitado tu micrófono', true);
        });

        socket.on('room:closed', () => {
            addMessage('Sistema', 'La sala ha finalizado', true);
            setTimeout(() => window.location.reload(), 2000);
        });

        // Controls
        micOrb.addEventListener('click', () => {
            if (!isAllowedToSpeak) return;
            isMicOn = !isMicOn;
            
            if (isMicOn) {
                if (recognition) recognition.start();
            } else {
                if (recognition) recognition.stop();
            }
            updateMicUI();
        });

        function updateMicUI() {
            micOrb.classList.toggle('listening', isMicOn);
            if (!isAllowedToSpeak) {
                micStatus.textContent = 'Silenciado por el Host';
                micStatus.className = 'text-sm font-bold text-red-400 tracking-wider uppercase mt-4';
            } else if (isMicOn) {
                micStatus.textContent = 'Escuchando y traduciendo...';
                micStatus.className = 'text-sm font-bold text-green-400 tracking-wider uppercase animate-pulse mt-4';
            } else {
                micStatus.textContent = 'Toca para hablar';
                micStatus.className = 'text-sm font-medium text-gray-400 tracking-wider uppercase mt-4';
            }
        }

        // Lang
        document.getElementById('lang-bar').addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            currentLang = e.target.dataset.lang;
            
            document.querySelectorAll('#lang-bar button').forEach(b => {
                b.className = 'btn-base btn-default px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0';
            });
            e.target.className = 'btn-base btn-active px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-full shrink-0 shadow-lg shadow-indigo-500/30';
            
            if (recognition) recognition.lang = currentLang;
            socket.emit('participant:change_lang', { roomCode: currentRoom, lang: currentLang });
        });

        // TTS
        document.getElementById('tts-on').addEventListener('click', (e) => {
            ttsEnabled = true;
            e.target.className = 'flex-1 btn-base btn-active py-2.5 text-sm rounded-xl font-medium shadow-lg shadow-indigo-500/20';
            document.getElementById('tts-off').className = 'flex-1 btn-base btn-default py-2.5 text-sm rounded-xl font-medium';
        });
        document.getElementById('tts-off').addEventListener('click', (e) => {
            ttsEnabled = false;
            window.speechSynthesis.cancel();
            e.target.className = 'flex-1 btn-base btn-candy py-2.5 text-sm rounded-xl font-medium shadow-lg shadow-pink-500/20';
            document.getElementById('tts-on').className = 'flex-1 btn-base btn-default py-2.5 text-sm rounded-xl font-medium';
        });

        // URL check
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');
        if (roomFromUrl) document.getElementById('room-code').value = roomFromUrl;
    </script>
</body>
</html>

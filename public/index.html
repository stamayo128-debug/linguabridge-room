<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinguaBridge Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ═══ JOIN SCREEN ═══ -->
<div class="join-screen" id="join-screen">
    <form class="join-form" id="join-form">
        <div class="logo">LinguaBridge</div>
        <p class="tagline">Traducción en tiempo real para todos</p>
        
        <div class="input-group">
            <label for="room-code">Código de Sala</label>
            <input type="text" id="room-code" placeholder="0000" maxlength="4" inputmode="numeric" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="participant-name">Tu Nombre</label>
            <input type="text" id="participant-name" placeholder="Tu nombre" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="lang-select">Idioma para OÍR/LEER</label>
            <select id="lang-select">
                <option value="es">🇪🇸 Español</option>
                <option value="en">🇬🇧 English</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="pt">🇵🇹 Português</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Entrar a la Sala</button>
        <div id="join-error" class="error-text"></div>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="host.html" class="btn btn-secondary">Crear Nueva Sala</a>
        </div>
    </form>
</div>

<!-- ═══ ROOM SCREEN (Swipe Container) ═══ -->
<div class="swipe-container hidden" id="room-container">
    <div class="swipe-wrapper" id="swipe-wrapper">
        
        <!-- ─── PANEL LEFT: Transcript (Dashboard) ─── -->
        <div class="panel panel-left" id="panel-transcript">
            <div class="panel-header">
                <h2><span class="pulse-dot"></span> Transcripción en Vivo</h2>
                <span class="header-badge" id="room-code-badge">Sala 0000</span>
            </div>
            
            <div class="transcript-area" id="transcript-area">
                <div class="welcome-msg">Habla para ver la traducción aquí...</div>
            </div>
            
            <div class="control-section" style="padding: 0 20px 20px;">
                <h4>Tu Idioma</h4>
                <div class="lang-selector" id="lang-selector">
                    <button class="lang-chip active" data-lang="es">🇪🇸 ES</button>
                    <button class="lang-chip" data-lang="en">🇬🇧 EN</button>
                    <button class="lang-chip" data-lang="fr">🇫🇷 FR</button>
                    <button class="lang-chip" data-lang="de">🇩🇪 DE</button>
                    <button class="lang-chip" data-lang="ja">🇯🇵 JA</button>
                    <button class="lang-chip" data-lang="zh">🇨🇳 ZH</button>
                    <button class="lang-chip" data-lang="ar">🇸🇦 AR</button>
                    <button class="lang-chip" data-lang="it">🇮🇹 IT</button>
                    <button class="lang-chip" data-lang="pt">🇵🇹 PT</button>
                </div>
            </div>
        </div>
        
        <!-- ─── PANEL CENTER: 3D Sphere ─── -->
        <div class="panel panel-center" id="panel-sphere">
            <div class="panel-header">
                <h2>Tu Idioma: <span id="current-lang-display">ES</span></h2>
            </div>
            
            <div class="sphere-container">
                <div class="sphere" id="sphere">
                    <div class="sphere-inner"></div>
                </div>
                <div class="sphere-particles" id="sphere-particles"></div>
            </div>
            
            <div class="mic-container" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);">
                <div class="visualizer" id="visualizer">
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                </div>
                <button class="mic-btn" id="mic-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </button>
                <span class="mic-status" id="mic-status">Micrófono apagado</span>
            </div>
        </div>
        
        <!-- ─── PANEL RIGHT: Participants (Host Only) ─── -->
        <div class="panel panel-right hidden" id="panel-participants">
            <div class="panel-header">
                <h2>👥 Participantes</h2>
                <span class="header-badge" id="participant-count-badge">0 conectados</span>
            </div>
            
            <div style="flex: 1; overflow-y: auto; padding: 0 20px;" id="participants-list">
                <div class="welcome-msg">Nadie conectado aún</div>
            </div>
        </div>
        
    </div>
    
    <!-- Navigation Pills -->
    <div class="nav-pills">
        <div class="nav-pill" data-panel="transcript"></div>
        <div class="nav-pill active" data-panel="sphere"></div>
        <div class="nav-pill hidden" data-panel="participants"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>

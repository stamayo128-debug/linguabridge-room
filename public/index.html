<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinguaBridge Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ═══ JOIN SCREEN ═══ -->
<div class="join-screen" id="join-screen">
    <form class="join-form" id="join-form">
        <div class="logo">LinguaBridge</div>
        <p class="tagline">Traducción en tiempo real para todos</p>
        
        <div class="input-group">
            <label for="room-code">Código de Sala</label>
            <input type="text" id="room-code" placeholder="0000" maxlength="4" inputmode="numeric" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="participant-name">Tu Nombre</label>
            <input type="text" id="participant-name" placeholder="Tu nombre" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label for="lang-select">Idioma para OÍR/LEER</label>
            <select id="lang-select">
                <option value="es" selected>🇪🇸 Español</option>
                <option value="en">🇬🇧 English</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="pt">🇵🇹 Português</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Entrar a la Sala</button>
        <div id="join-error" class="error-text"></div>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="host.html" class="btn btn-secondary">Crear Nueva Sala</a>
        </div>
    </form>
</div>

<!-- ═══ ROOM SCREEN (Swipe Container) ═══ -->
<div class="swipe-container hidden" id="room-container">
    <div class="swipe-wrapper" id="swipe-wrapper">
        
        <!-- ─── PANEL LEFT: Transcript ─── -->
        <div class="panel panel-left" id="panel-transcript">
            <div class="panel-header">
                <h2><span class="pulse-dot"></span> Transcripción</h2>
                <span class="header-badge" id="room-code-badge">Sala 0000</span>
            </div>
            
            <div class="transcript-area" id="transcript-area">
                <div class="welcome-msg">Habla para ver la traducción aquí...</div>
            </div>
        </div>
        
        <!-- ─── PANEL CENTER: 3D Sphere ─── -->
        <div class="panel panel-center" id="panel-sphere">
            <div class="panel-header">
                <h2>Tu idioma: <span id="current-lang-display" style="color: var(--accent);">ES</span></h2>
            </div>
            
            <div class="sphere-container">
                <div class="sphere" id="sphere">
                    <div class="sphere-inner"></div>
                </div>
                <div class="sphere-particles" id="sphere-particles"></div>
            </div>
            
            <div class="mic-container" style="position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);">
                <div class="visualizer" id="visualizer">
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                    <div class="viz-bar" style="height: 10px;"></div>
                </div>
                <button class="mic-btn" id="mic-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </button>
                <span class="mic-status" id="mic-status">Micrófono apagado</span>
            </div>
            
            <!-- Language selector -->
            <div style="position: absolute; bottom: 20px; left: 0; right: 0;">
                <div class="lang-selector" id="lang-selector">
                    <button class="lang-chip active" data-lang="es">🇪🇸</button>
                    <button class="lang-chip" data-lang="en">🇬🇧</button>
                    <button class="lang-chip" data-lang="fr">🇫🇷</button>
                    <button class="lang-chip" data-lang="de">🇩🇪</button>
                    <button class="lang-chip" data-lang="ja">🇯🇵</button>
                    <button class="lang-chip" data-lang="zh">🇨🇳</button>
                    <button class="lang-chip" data-lang="ar">🇸🇦</button>
                    <button class="lang-chip" data-lang="it">🇮🇹</button>
                    <button class="lang-chip" data-lang="pt">🇵🇹</button>
                </div>
            </div>
        </div>
        
        <!-- ─── PANEL RIGHT: Info ─── -->
        <div class="panel panel-right" id="panel-info">
            <div class="panel-header">
                <h2>ℹ️ Info</h2>
            </div>
            
            <div style="padding: 20px; flex: 1;">
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px;">
                    <h4 style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px;">SALA</h4>
                    <div id="info-room-code" style="font-size: 2rem; font-weight: 700; color: var(--primary-light); letter-spacing: 4px;">0000</div>
                </div>
                
                <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px;">
                    <h4 style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px;">TU NOMBRE</h4>
                    <div id="info-name" style="font-size: 1.2rem; font-weight: 600;">-</div>
                </div>
                
                <div style="margin-top: 24px; color: var(--text-dim); font-size: 0.85rem; text-align: center;">
                    <p>Desliza a la derecha para cambiar tu idioma</p>
                </div>
            </div>
        </div>
        
    </div>
    
    <!-- Navigation Pills -->
    <div class="nav-pills">
        <div class="nav-pill" data-panel="transcript"></div>
        <div class="nav-pill active" data-panel="sphere"></div>
        <div class="nav-pill" data-panel="info"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>

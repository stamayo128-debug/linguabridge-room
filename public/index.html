<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LinguaBridge - Participante</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface-light: #252532;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #22c55e;
            --danger: #ef4444;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255,255,255,0.08);
        }
        
        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        
        .app { height: 100%; display: flex; flex-direction: column; }
        
        .screen { height: 100%; display: flex; flex-direction: column; }
        .screen.hidden { display: none; }
        
        /* Login */
        .login-screen {
            justify-content: center;
            padding: 32px 24px;
            background: linear-gradient(180deg, #14141c 0%, var(--bg) 100%);
        }
        
        .login-screen h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #818cf8, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-screen p {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        
        .form-group { margin-bottom: 16px; }
        
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
        }
        
        .error { color: var(--danger); font-size: 0.85rem; text-align: center; margin-top: 12px; min-height: 20px; }
        
        /* Room */
        .room-header {
            padding: 16px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .room-info { display: flex; align-items: center; gap: 12px; }
        .room-code { font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
        .user-name { font-size: 0.85rem; color: var(--text-dim); }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }
        .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-dot.connecting { background: #f59e0b; }
        
        /* Transcript */
        .transcript {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            padding: 14px 16px;
            background: var(--surface);
            border-radius: 14px;
            border-left: 3px solid var(--primary);
            animation: slideIn 0.3s ease;
        }
        
        .message.system {
            border-left-color: var(--accent);
            background: rgba(34, 197, 94, 0.08);
        }
        
        .message.interim {
            opacity: 0.5;
            border-left-color: #f59e0b;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .msg-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .time { font-size: 0.7rem; color: var(--text-dim); }
        
        .text { font-size: 1rem; line-height: 1.5; }
        
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            text-align: center;
            gap: 12px;
        }
        
        .empty-state .icon { font-size: 3rem; }
        
        /* Controls */
        .controls {
            padding: 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .mic-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--surface-light);
            border: 2px solid var(--border);
            margin: 0 auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .mic-btn.active {
            background: linear-gradient(135deg, var(--accent), #16a34a);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
        }
        
        .mic-btn svg { width: 28px; height: 28px; color: var(--text-dim); }
        .mic-btn.active svg { color: white; }
        
        .mic-status {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        
        .mic-status.active { color: var(--accent); }
        
        /* Language selector */
        .lang-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .lang-btn {
            padding: 10px 16px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Toggle row */
        .toggle-row {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        
        .toggle-btn {
            padding: 10px 20px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .toggle-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app">
        <!-- Login -->
        <div class="screen" id="login-screen">
            <div class="login-screen">
                <h1>LinguaBridge</h1>
                <p>Traducción en tiempo real</p>
                
                <div class="form-group">
                    <label>Sala</label>
                    <input type="text" id="room-code" placeholder="0000" maxlength="4" inputmode="numeric">
                </div>
                
                <div class="form-group">
                    <label>Tu nombre</label>
                    <input type="text" id="participant-name" placeholder="Nombre">
                </div>
                
                <div class="form-group">
                    <label>Idioma</label>
                    <select id="lang-select">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="ja">日本語</option>
                        <option value="zh">中文</option>
                        <option value="pt">Português</option>
                    </select>
                </div>
                
                <button class="btn" id="join-btn">Entrar</button>
                <div class="error" id="error"></div>
                
                <button class="btn btn-secondary" style="margin-top: 16px;" onclick="window.location.href='host.html'">Crear sala</button>
            </div>
        </div>
        
        <!-- Room -->
        <div class="screen hidden" id="room-screen">
            <div class="room-header">
                <div class="room-info">
                    <span class="room-code" id="display-room">----</span>
                    <span class="user-name" id="display-name">-</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div class="status-dot" id="status-dot"></div>
                    <span style="font-size:0.75rem;color:var(--text-dim)" id="status-text">Conectando</span>
                </div>
            </div>
            
            <div class="transcript" id="transcript">
                <div class="empty-state">
                    <div class="icon">🎙️</div>
                    <p>Habla para ver la traducción</p>
                </div>
            </div>
            
            <div class="controls">
                <div class="toggle-row">
                    <button class="toggle-btn active" id="tts-on">🔊 Voz ON</button>
                    <button class="toggle-btn" id="tts-off">🔇 Voz OFF</button>
                </div>
                
                <button class="mic-btn" id="mic-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                    </svg>
                </button>
                <div class="mic-status" id="mic-status">Micrófono apagado</div>
                
                <div class="lang-bar" id="lang-bar">
                    <button class="lang-btn active" data-lang="es">ES</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="fr">FR</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                    <button class="lang-btn" data-lang="ja">JA</button>
                    <button class="lang-btn" data-lang="zh">ZH</button>
                    <button class="lang-btn" data-lang="pt">PT</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        let currentRoom = '';
        let currentName = '';
        let currentLang = 'es';
        let isMicOn = false;
        let ttsEnabled = true;
        let recognition = null;
        let bestVoices = {};
        
        const loginScreen = document.getElementById('login-screen');
        const roomScreen = document.getElementById('room-screen');
        const errorEl = document.getElementById('error');
        const transcriptEl = document.getElementById('transcript');
        
        // TTS voices
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            console.log("Voces disponibles:", voices.map(v => `${v.name} (${v.lang})`));
            
            ['es','en','fr','de','ja','zh','pt'].forEach(lang => {
                // Primero buscar una voz nativa buena (Google, Microsoft, Siri)
                bestVoices[lang] = voices.find(v => v.lang.startsWith(lang) && (v.name.includes('Google') || v.name.includes('Neural') || v.name.includes('Siri'))) 
                                || voices.find(v => v.lang.startsWith(lang)) 
                                || null;
            });
            console.log("Voces seleccionadas:", bestVoices);
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
        
        function speak(text, lang) {
            if (!ttsEnabled) return;
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            if (bestVoices[lang]) utt.voice = bestVoices[lang];
            utt.lang = lang;
            utt.rate = 1;
            window.speechSynthesis.speak(utt);
        }
        
        // STT
        function initSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addMessage('Sistema', 'STT no disponible en este navegador', true);
                return;
            }
            
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = currentLang;
            
            let lastFinal = '';
            
            recognition.onresult = (e) => {
                let final = '', interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    const r = e.results[i];
                    if (r.isFinal) final += r[0].transcript;
                    else interim += r[0].transcript;
                }
                
                if (final.trim() && final !== lastFinal) {
                    lastFinal = final;
                    const text = final.trim();
                    console.log('STT:', text);
                    removeInterim();
                    socket.emit('translate:text', {
                        roomCode: currentRoom,
                        text: text,
                        speakerName: currentName,
                        speakerLang: currentLang
                    });
                } else if (interim.trim()) {
                    showInterim(interim.trim());
                }
            };
            
            recognition.onerror = (e) => {
                if (e.error === 'no-speech') return;
                console.error('STT error:', e.error);
                document.getElementById('mic-status').textContent = 'Error: ' + e.error;
            };
            
            recognition.onend = () => {
                if (isMicOn && recognition) recognition.start();
            };
        }
        
        function showInterim(text) {
            let el = document.getElementById('interim-msg');
            if (!el) {
                el = document.createElement('div');
                el.id = 'interim-msg';
                el.className = 'message interim';
                transcriptEl.appendChild(el);
            }
            el.innerHTML = `<div class="sender">${currentName}</div><div class="text" style="font-style:italic">${text}...</div>`;
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
        
        function removeInterim() {
            const el = document.getElementById('interim-msg');
            if (el) el.remove();
        }
        
        function addMessage(sender, text, isSystem = false) {
            const empty = transcriptEl.querySelector('.empty-state');
            if (empty) empty.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${isSystem ? 'system' : ''}`;
            const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            msg.innerHTML = `
                <div class="msg-header">
                    <span class="sender">${sender}</span>
                    <span class="time">${time}</span>
                </div>
                <div class="text">${text}</div>
            `;
            transcriptEl.appendChild(msg);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
        
        // Join
        document.getElementById('join-btn').addEventListener('click', async () => {
            currentRoom = document.getElementById('room-code').value.trim();
            currentName = document.getElementById('participant-name').value.trim();
            currentLang = document.getElementById('lang-select').value;
            
            if (!currentRoom || !currentName) {
                errorEl.textContent = 'Completa todos los campos';
                return;
            }
            
            errorEl.textContent = 'Conectando...';
            
            // Warm up TTS
            const utt = new SpeechSynthesisUtterance(' ');
            utt.volume = 0;
            window.speechSynthesis.speak(utt);
            
            await initAudio();
            initSTT();
            
            socket.emit('participant:join_room', {
                roomCode: currentRoom,
                name: currentName,
                lang: currentLang
            });
        });
        
        let audioContext, analyser, dataArray, micStream;
        
        async function initAudio() {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const source = audioContext.createMediaStreamSource(micStream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (e) {
                console.error('Audio error:', e);
            }
        }
        
        // Socket events
        socket.on('connect', () => {
            document.getElementById('status-dot').className = 'status-dot connected';
            document.getElementById('status-text').textContent = 'Conectado';
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status-dot').className = 'status-dot';
            document.getElementById('status-text').textContent = 'Desconectado';
        });
        
        socket.on('participant:joined', (data) => {
            loginScreen.classList.add('hidden');
            roomScreen.classList.remove('hidden');
            document.getElementById('display-room').textContent = data.roomCode;
            document.getElementById('display-name').textContent = data.name;
            addMessage('Sistema', '¡Bienvenido! Presiona el micrófono y habla.', true);
        });
        
        socket.on('error', (msg) => {
            errorEl.textContent = msg;
        });
        
        socket.on('transcript:broadcast', (data) => {
            if (!data.text) return;
            
            addMessage(data.senderName, data.text);
            
            if (!data.isMe && data.senderName !== currentName) {
                setTimeout(() => speak(data.text, currentLang), 300);
            }
        });
        
        socket.on('host:force_mute', () => {
            isMicOn = false;
            if (recognition) recognition.stop();
            updateMicUI();
            addMessage('Sistema', 'El host te ha silenciado', true);
        });
        
        socket.on('host:allow_speak', () => {
            addMessage('Sistema', 'El host te permite hablar', true);
        });
        
        socket.on('room:closed', () => {
            addMessage('Sistema', 'La sala ha sido cerrada', true);
            setTimeout(() => window.location.reload(), 2000);
        });
        
        // Controls
        const micBtn = document.getElementById('mic-btn');
        const micStatus = document.getElementById('mic-status');
        
        micBtn.addEventListener('click', () => {
            isMicOn = !isMicOn;
            
            if (isMicOn) {
                if (recognition) recognition.start();
            } else {
                if (recognition) recognition.stop();
            }
            
            updateMicUI();
        });
        
        function updateMicUI() {
            micBtn.classList.toggle('active', isMicOn);
            micStatus.textContent = isMicOn ? 'Escuchando...' : 'Micrófono apagado';
            micStatus.classList.toggle('active', isMicOn);
        }
        
        // Language
        document.getElementById('lang-bar').addEventListener('click', (e) => {
            const btn = e.target.closest('.lang-btn');
            if (!btn) return;
            
            currentLang = btn.dataset.lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (recognition) recognition.lang = currentLang;
            socket.emit('participant:change_lang', { roomCode: currentRoom, lang: currentLang });
        });
        
        // TTS toggle
        document.getElementById('tts-on').addEventListener('click', () => {
            ttsEnabled = true;
            document.getElementById('tts-on').classList.add('active');
            document.getElementById('tts-off').classList.remove('active');
        });
        
        document.getElementById('tts-off').addEventListener('click', () => {
            ttsEnabled = false;
            document.getElementById('tts-on').classList.remove('active');
            document.getElementById('tts-off').classList.add('active');
            window.speechSynthesis.cancel();
        });
        
        // URL room code
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');
        if (roomFromUrl) {
            document.getElementById('room-code').value = roomFromUrl;
        }
    </script>
</body>
</html>
